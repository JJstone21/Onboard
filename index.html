<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>(주)온보드 자재 카탈로그</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --p:#6246EA;--p-dark:#4f37c8;--p-dim:#ede9fc;
  --t:#0EA5A0;--t-dim:#E0F7F6;
  --grad:linear-gradient(135deg,#6246EA,#0EA5A0);
  --grad-soft:linear-gradient(135deg,rgba(98,70,234,.06),rgba(14,165,160,.06));
  --red:#EF4444;
  --bg:#F7F8FC;--card:#fff;
  --bd:#E4E6EF;--bd2:#F0F1F7;
  --tx1:#0F0F1A;--tx2:#4B4B6B;--tx3:#9898B8;
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;--r24:24px;--r50:50px;
  --hh:60px;
  --sh-sm:0 1px 4px rgba(98,70,234,.08);
  --sh-md:0 4px 20px rgba(98,70,234,.12);
  --sh-lg:0 8px 40px rgba(98,70,234,.18);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx1);font-size:14px;-webkit-font-smoothing:antialiased;}
body{padding-top:var(--hh);}
button,input,textarea{font-family:inherit;cursor:pointer;}
a{text-decoration:none;}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;z-index:300;height:var(--hh);background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);box-shadow:0 2px 8px rgba(0,0,0,.08);}
.hdr-in{max-width:1140px;margin:0 auto;height:100%;display:flex;align-items:center;padding:0 20px;gap:12px;}
.logo-img-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.logo-img{height:36px;width:auto;}
.logo-txt{font-size:21px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;letter-spacing:-.3px;}
@media(max-width:639px){.logo-img{height:28px;}.logo-txt{font-size:17px;}}
.hdr-actions{display:flex;align-items:center;gap:8px;margin-left:auto;}
.srch-box{display:flex;align-items:center;overflow:hidden;width:40px;height:40px;border-radius:var(--r12);border:1.5px solid transparent;background:var(--p-dim);transition:all .3s cubic-bezier(.4,0,.2,1);}
.srch-box.open{width:220px;background:#fff;border-color:var(--p);box-shadow:0 0 0 3px var(--p-dim);}
@media(max-width:639px){.srch-box.open{width:160px;}}
.srch-ico-btn{width:38px;height:38px;min-width:38px;border:none;background:transparent;color:var(--p);display:flex;align-items:center;justify-content:center;border-radius:var(--r8);flex-shrink:0;}
.srch-inp{width:0;border:none;background:transparent;outline:none;font-size:13px;color:var(--tx1);padding:0;transition:width .3s,padding .3s;font-family:inherit;}
.srch-box.open .srch-inp{width:100%;padding:0 10px 0 2px;}
.srch-inp::placeholder{color:var(--tx3);}
.ico-btn{width:40px;height:40px;border-radius:var(--r12);border:none;background:var(--p-dim);color:var(--p);display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0;position:relative;}
.ico-btn:hover{background:var(--p);color:#fff;transform:scale(1.05);}
.ico-btn svg{width:20px;height:20px;}
.cart-badge{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:var(--r50);padding:2px 5px;min-width:18px;text-align:center;border:2px solid #fff;display:none;box-shadow:0 2px 6px rgba(239,68,68,.4);}
.cart-badge.show{display:block;}

/* LAYOUT */
.wrap{max-width:1140px;margin:0 auto;display:flex;min-height:calc(100vh - var(--hh));}
@media(min-width:640px){
  #mob-tab{display:none;}#mob-bar{display:none;}
  #sidebar{width:180px;min-width:180px;flex-shrink:0;background:var(--card);border-right:1px solid var(--bd);position:sticky;top:var(--hh);height:calc(100vh - var(--hh));overflow-y:auto;padding:16px 10px;scrollbar-width:thin;scrollbar-color:var(--bd) transparent;}
  #sidebar::-webkit-scrollbar{width:3px;}#sidebar::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px;}
  .sb-sec{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:1.2px;text-transform:uppercase;padding:10px 10px 6px;}
  .sb-btn{display:flex;align-items:center;width:100%;padding:9px 12px;border:none;background:none;font-size:13px;color:var(--tx2);border-radius:var(--r8);transition:all .15s;margin-bottom:2px;text-align:left;}
  .sb-btn:hover{background:var(--p-dim);color:var(--p);}
  .sb-btn.active{background:var(--grad);color:#fff;font-weight:600;box-shadow:0 2px 12px rgba(98,70,234,.25);}
  #content{flex:1;min-width:0;padding:24px 20px;}
}
@media(max-width:639px){
  #sidebar{display:none;}.wrap{display:block;}
  #mob-tab{position:sticky;top:var(--hh);z-index:200;background:var(--card);border-bottom:1px solid var(--bd);display:flex;overflow-x:auto;scrollbar-width:none;}
  #mob-tab::-webkit-scrollbar{display:none;}
  .tab-btn{flex:0 0 auto;padding:13px 16px;font-size:12.5px;font-weight:500;color:var(--tx3);border:none;background:none;white-space:nowrap;border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:all .15s;}
  .tab-btn.active{color:var(--p);font-weight:700;border-bottom-color:var(--p);}
  #content{padding:12px 10px 90px;}
  #mob-bar{position:fixed;bottom:0;left:0;right:0;z-index:250;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-top:1px solid var(--bd);padding:10px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 -4px 20px rgba(98,70,234,.1);}
  #mob-info{flex:1;}#mob-cnt{font-size:11px;color:var(--tx3);margin-bottom:1px;}
  #mob-total{font-size:17px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  #mob-quote-btn{background:var(--grad);color:#fff;border:none;border-radius:var(--r12);padding:13px 20px;font-size:14px;font-weight:700;white-space:nowrap;flex-shrink:0;box-shadow:0 4px 16px rgba(98,70,234,.35);}
  #mob-quote-btn:disabled{background:#ddd;box-shadow:none;}
}

/* TOTAL LABEL */
.total-lbl{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:16px;}
.total-lbl .chip{background:var(--p-dim);color:var(--p);font-size:11px;font-weight:700;padding:3px 9px;border-radius:var(--r50);}

/* PRODUCT CARDS */
.pg-card{background:var(--card);border:1.5px solid var(--bd);border-radius:var(--r16);margin-bottom:10px;overflow:hidden;transition:all .2s;box-shadow:var(--sh-sm);}
.pg-card:hover{border-color:#c8c0f0;box-shadow:var(--sh-md);}
.pg-card.open{border-color:var(--p);border-width:2px;box-shadow:0 6px 30px rgba(98,70,234,.14);}
.pg-hdr{display:flex;align-items:center;gap:14px;padding:15px 18px;cursor:pointer;user-select:none;transition:background .15s;}
.pg-hdr:hover{background:#FAFAFF;}
@media(max-width:639px){.pg-hdr{padding:13px 14px;gap:10px;}}
.pg-meta{flex:1;min-width:0;}
.pg-name{font-size:14px;font-weight:600;color:var(--tx1);line-height:1.4;}
@media(min-width:640px){.pg-name{font-size:15px;}}
.pg-chip{display:inline-block;margin-top:5px;font-size:11px;color:var(--tx3);background:var(--bd2);padding:2px 9px;border-radius:var(--r50);}
.pg-arr{width:32px;height:32px;min-width:32px;border-radius:var(--r8);background:var(--bd2);display:flex;align-items:center;justify-content:center;color:var(--tx2);transition:all .25s;}
.pg-arr svg{width:16px;height:16px;transition:transform .25s;}
.pg-card.open .pg-arr{background:var(--p);color:#fff;box-shadow:0 3px 10px rgba(98,70,234,.3);}
.pg-card.open .pg-arr svg{transform:rotate(180deg);}
.pg-hdr:hover .pg-arr{background:var(--p-dim);color:var(--p);}
.pg-card.open .pg-hdr:hover .pg-arr{background:var(--p-dark);color:#fff;}
.pg-opts{display:none;border-top:1px solid var(--bd2);}
.pg-card.open .pg-opts{display:block;}

/* OPTIONS - PC */
@media(min-width:640px){
  .opt-row{display:grid;grid-template-columns:1fr 120px 120px 80px;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--bd2);transition:background .1s;}
  .opt-row:last-child{border-bottom:none;}
  .opt-row:hover{background:#FAFAFF;}
}
/* OPTIONS - MOBILE */
@media(max-width:639px){
  .opt-row{display:grid;grid-template-columns:1fr auto;grid-template-rows:auto auto;gap:8px 10px;padding:12px 14px;border-bottom:1px solid var(--bd2);}
  .opt-row:last-child{border-bottom:none;}
  .opt-name{grid-column:1;grid-row:1;}
  .opt-price{grid-column:2;grid-row:1;text-align:right;}
  .opt-qty{grid-column:1;grid-row:2;}
  .opt-add{grid-column:2;grid-row:2;}
}
.opt-name{font-size:13px;color:var(--tx2);line-height:1.4;}
.opt-price{text-align:right;}
.price-val{font-size:14px;font-weight:700;color:var(--t);}
.price-inq{font-size:12px;color:var(--tx3);font-style:italic;}
.vat-lbl{display:block;font-size:10px;color:var(--tx3);margin-top:1px;}
.opt-qty{display:flex;align-items:center;width:fit-content;border:1.5px solid var(--bd);border-radius:var(--r8);overflow:hidden;background:#fff;}
.q-btn{width:32px;height:32px;border:none;background:transparent;font-size:17px;color:var(--tx2);display:flex;align-items:center;justify-content:center;transition:background .1s;}
.q-btn:hover{background:var(--p-dim);color:var(--p);}
.q-inp{width:38px;height:32px;border:none;border-inline:1.5px solid var(--bd);text-align:center;font-size:13px;font-weight:600;background:#fff;color:var(--tx1);-moz-appearance:textfield;}
.q-inp::-webkit-inner-spin-button{-webkit-appearance:none;}
.opt-add{background:var(--grad);color:#fff;border:none;border-radius:var(--r8);padding:0;height:32px;font-size:12.5px;font-weight:600;width:100%;transition:opacity .15s;}
.opt-add:hover{opacity:.88;}
.opt-add:active{transform:scale(.96);}
@media(max-width:639px){.opt-add{padding:0 16px;width:auto;}}
.bulk-bar{
  display:flex;gap:8px;padding:12px 14px;
  border-top:1.5px solid var(--bd2);
  background:var(--bd2);
}
@media(min-width:640px){.bulk-bar{padding:12px 18px;}}
.bulk-all-btn{
  flex:1;background:#fff;color:var(--p);
  border:1.5px solid var(--p);border-radius:var(--r8);
  height:40px;font-size:13px;font-weight:600;
  transition:all .15s;
}
.bulk-all-btn:hover{background:var(--p-dim);}
.bulk-quote-btn{
  flex:2;background:var(--grad);color:#fff;border:none;
  border-radius:var(--r8);height:40px;font-size:13px;font-weight:700;
  box-shadow:0 3px 12px rgba(98,70,234,.3);transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.bulk-quote-btn:hover{opacity:.9;}

/* STATE */
.state-box{text-align:center;padding:80px 20px;color:var(--tx3);}
.state-icon{font-size:48px;margin-bottom:16px;display:block;}
.state-box p{font-size:14px;line-height:1.7;}
.retry-btn{margin-top:16px;background:var(--grad);color:#fff;border:none;border-radius:var(--r50);padding:12px 30px;font-size:13px;font-weight:600;}

/* CART DRAWER */
#cart-ov{position:fixed;inset:0;background:rgba(15,15,26,.5);z-index:500;display:none;backdrop-filter:blur(6px);}
#cart-ov.open{display:block;}
#cart-drw{position:fixed;right:0;top:0;bottom:0;width:min(400px,100vw);background:var(--bg);z-index:501;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);box-shadow:-12px 0 60px rgba(98,70,234,.2);}
#cart-drw.open{transform:translateX(0);}
.drw-hdr{background:var(--grad);padding:18px 20px;flex-shrink:0;}
.drw-hdr-top{display:flex;align-items:center;justify-content:space-between;}
.drw-title{font-size:16px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;}
.drw-title svg{width:20px;height:20px;opacity:.9;}
.drw-hdr-btns{display:flex;align-items:center;gap:6px;}
.drw-close{width:32px;height:32px;border-radius:var(--r8);border:none;background:rgba(255,255,255,.18);color:#fff;display:flex;align-items:center;justify-content:center;}
.drw-close:hover{background:rgba(255,255,255,.3);}
.drw-close svg{width:16px;height:16px;}
.drw-count-badge{background:rgba(255,255,255,.25);color:#fff;font-size:12px;font-weight:600;padding:2px 9px;border-radius:var(--r50);}
.drw-body{flex:1;overflow-y:auto;padding:0;background:#fff;scrollbar-width:thin;scrollbar-color:var(--bd) transparent;}
.drw-body::-webkit-scrollbar{width:4px;}
.drw-body::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px;}
.cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:40px 20px;color:var(--tx3);text-align:center;gap:12px;}
.cart-empty svg{width:56px;height:56px;opacity:.25;}
.cart-empty p{font-size:13px;line-height:1.7;}

/* CART ITEMS */
.c-item{background:#fff;padding:11px 14px;border-bottom:1px solid var(--bd2);display:grid;grid-template-columns:1fr auto;grid-template-rows:auto auto;gap:6px 10px;align-items:center;}
.c-item:last-child{border-bottom:none;}
.c-item-hd{grid-column:1;grid-row:1;display:flex;align-items:flex-start;gap:4px;min-width:0;}
.c-item-info{flex:1;min-width:0;}
.c-item-name{font-size:12px;font-weight:500;color:var(--tx3);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-item-opt{font-size:13px;font-weight:600;color:var(--tx1);line-height:1.3;margin-top:1px;}
.c-item-rm{background:none;border:none;width:22px;height:22px;display:flex;align-items:center;justify-content:center;color:var(--tx3);transition:color .15s;flex-shrink:0;margin-top:1px;}
.c-item-rm:hover{color:var(--red);}
.c-item-rm svg{width:13px;height:13px;}
.c-qty{grid-column:2;grid-row:1;display:flex;align-items:center;border:1.5px solid var(--bd);border-radius:var(--r8);background:#fff;height:30px;align-self:end;}
.cq-btn{width:26px;height:28px;border:none;background:transparent;color:var(--tx2);display:flex;align-items:center;justify-content:center;}
.cq-btn:hover{color:var(--p);}
.cq-btn svg{width:13px;height:13px;}
.cq-num{min-width:26px;text-align:center;font-size:13px;font-weight:700;color:var(--tx1);border-inline:1.5px solid var(--bd);height:100%;display:flex;align-items:center;justify-content:center;}
.c-item-ft{grid-column:1;grid-row:2;display:flex;align-items:center;gap:6px;}
.c-item-price{font-size:14px;font-weight:700;color:var(--tx1);}
.c-item-vat{font-size:10px;color:var(--tx3);}
.c-item-inq{font-size:12px;color:var(--tx3);font-style:italic;}

/* DRAWER FOOTER */
.drw-ftr{padding:14px 16px;border-top:1.5px solid var(--bd);flex-shrink:0;background:#fff;}
.drw-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.drw-total-lbl{font-size:13px;color:var(--tx2);font-weight:500;}
.drw-total-val{font-size:17px;font-weight:800;color:var(--tx1);}
.drw-ftr-btns{display:flex;gap:8px;}
.drw-clear-btn{flex:0 0 auto;background:none;border:1.5px solid var(--bd);color:var(--tx2);border-radius:var(--r8);padding:0 16px;height:44px;font-size:13px;font-weight:500;white-space:nowrap;}
.drw-clear-btn:hover{border-color:var(--red);color:var(--red);}
.quote-btn{flex:1;background:var(--grad);color:#fff;border:none;border-radius:var(--r8);height:44px;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 4px 14px rgba(98,70,234,.3);}
.quote-btn:hover{opacity:.9;}
.quote-btn:active{transform:scale(.98);}
.quote-btn:disabled{background:#e0e0e0;box-shadow:none;color:#aaa;}
.quote-btn svg{width:17px;height:17px;}

/* COPY MODAL */
#copy-modal-wrap{position:fixed;inset:0;background:rgba(15,15,26,.55);z-index:800;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
#copy-modal-wrap.open{display:flex;}
@media(min-width:640px){#copy-modal-wrap{align-items:center;padding:16px;}}
.copy-modal{background:#fff;width:100%;max-width:480px;border-radius:24px 24px 0 0;overflow:hidden;display:flex;flex-direction:column;max-height:82vh;box-shadow:0 -8px 40px rgba(98,70,234,.2);}
@media(min-width:640px){.copy-modal{border-radius:20px;}}
.cm-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--grad);}
.cm-title{font-size:15px;font-weight:700;color:#fff;}
.cm-close{background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center;}
.cm-body{padding:14px 18px;flex:1;overflow-y:auto;}
.cm-guide{background:var(--p-dim);border-radius:var(--r8);padding:10px 14px;font-size:12px;color:var(--p);margin-bottom:12px;line-height:1.7;}
.cm-textarea{width:100%;border:1.5px solid var(--bd);border-radius:var(--r12);padding:14px;font-size:13px;font-family:inherit;color:var(--tx1);line-height:1.9;resize:none;outline:none;background:#fafafa;min-height:220px;}
.cm-textarea:focus{border-color:var(--p);}
.cm-ftr{padding:12px 18px 20px;flex-shrink:0;}
.cm-copy-btn{width:100%;background:var(--grad);color:#fff;border:none;border-radius:var(--r12);padding:14px;font-size:15px;font-weight:700;box-shadow:0 4px 14px rgba(98,70,234,.3);}
.cm-copy-btn:hover{opacity:.9;}

/* MODAL */
#modal-wrap{position:fixed;inset:0;background:rgba(15,15,26,.5);z-index:600;display:none;align-items:flex-end;justify-content:center;padding:0;backdrop-filter:blur(6px);}
#modal-wrap.open{display:flex;}
@media(min-width:640px){#modal-wrap{align-items:center;padding:16px;}}
.modal{background:#fff;width:100%;max-width:500px;overflow:hidden;display:flex;flex-direction:column;max-height:94vh;border-radius:24px 24px 0 0;box-shadow:0 -8px 60px rgba(98,70,234,.2);}
@media(min-width:640px){.modal{border-radius:24px;}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 16px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.modal-title{font-size:17px;font-weight:700;color:var(--tx1);}
.modal-close{width:32px;height:32px;border-radius:var(--r8);border:none;background:var(--bd2);font-size:16px;color:var(--tx2);display:flex;align-items:center;justify-content:center;}
.modal-body{overflow-y:auto;padding:22px;}
.fld{margin-bottom:16px;}
.fld label{display:block;font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:6px;letter-spacing:.4px;}
.fld input,.fld textarea{width:100%;border:1.5px solid var(--bd);border-radius:var(--r12);padding:12px 14px;font-size:14px;outline:none;background:#fff;color:var(--tx1);transition:all .15s;}
.fld input:focus,.fld textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px var(--p-dim);}
.fld textarea{resize:vertical;min-height:76px;}
.sec-lbl{font-size:11px;font-weight:700;color:var(--tx3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;}
.m-items{background:var(--bg);border-radius:var(--r12);padding:12px;margin-bottom:14px;max-height:160px;overflow-y:auto;}
.m-item-row{display:flex;justify-content:space-between;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12px;}
.m-item-row:last-child{border-bottom:none;}
.m-name{flex:1;color:var(--tx2);line-height:1.5;}
.m-price{font-weight:700;color:var(--t);white-space:nowrap;}
.m-total{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-radius:var(--r12);margin-bottom:18px;background:linear-gradient(135deg,rgba(98,70,234,.07),rgba(14,165,160,.07));border:1.5px solid rgba(98,70,234,.12);}
.m-total-lbl{font-size:13px;color:var(--p);font-weight:600;}
.m-total-val{font-size:18px;font-weight:800;color:var(--p);}
.kakao-btn{width:100%;background:#FEE500;color:#191919;border:none;border-radius:var(--r12);padding:15px;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(254,229,0,.35);}
.kakao-btn::before{content:'';width:22px;height:22px;flex-shrink:0;background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="%23191919" d="M12 3C6.477 3 2 6.589 2 11c0 2.762 1.674 5.193 4.228 6.706L5.1 21.26a.5.5 0 0 0 .721.543L10.1 19.5A12.3 12.3 0 0 0 12 19.6c5.523 0 10-3.589 10-8.6S17.523 3 12 3z"/></svg>') center/contain no-repeat;}
.modal-notice{font-size:11px;color:var(--tx3);text-align:center;margin-top:14px;line-height:1.8;}
.modal-notice strong{color:var(--tx1);}

/* 담기 팝업 */
#cart-popup{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(12px);z-index:700;opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);pointer-events:none;width:min(360px,calc(100vw - 32px));}
#cart-popup.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}
@media(min-width:640px){#cart-popup{bottom:32px;}}
.cp-inner{background:#fff;border-radius:var(--r16);box-shadow:0 8px 40px rgba(0,0,0,.18);display:flex;align-items:center;gap:12px;padding:14px 16px;}
.cp-icon{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#16a34a);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cp-icon svg{width:18px;height:18px;color:#fff;}
.cp-text{flex:1;min-width:0;}
.cp-name{font-size:12px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cp-opt{font-size:13px;font-weight:600;color:var(--tx1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cp-undo{background:none;border:1.5px solid var(--bd);border-radius:var(--r8);padding:7px 14px;font-size:12px;font-weight:600;color:var(--tx2);white-space:nowrap;flex-shrink:0;}
.cp-undo:hover{border-color:var(--red);color:var(--red);}
.cp-bar{height:3px;background:var(--bd2);border-radius:2px;margin-top:10px;overflow:hidden;}
.cp-bar-fill{height:100%;background:var(--grad);border-radius:2px;width:100%;transition:width linear;}

/* TOAST */
#toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--tx1);color:#fff;padding:11px 22px;border-radius:var(--r50);font-size:13px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;z-index:700;white-space:nowrap;max-width:90vw;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.25);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(min-width:640px){#toast{bottom:28px;}}
</style>
</head>

<div class="wrap">
  <div id="mob-tab"></div>
  <nav id="sidebar"></nav>
  <div id="content">
    <div class="total-lbl" id="totalLbl">
      <span>상품 목록</span>
      <span class="chip" id="totalChip">불러오는 중...</span>
    </div>
    <div id="prodList"></div>
  </div>
</div>

<div id="mob-bar">
  <div id="mob-info">
    <div id="mob-cnt">장바구니가 비어있습니다</div>
    <div id="mob-total">&#8361;0</div>
  </div>
  <button id="mob-quote-btn" disabled onclick="openCart()">&#x1F6D2; 견적 보기</button>
</div>

<div id="cart-ov"></div>
<div id="cart-drw">
  <div class="drw-hdr">
    <div class="drw-hdr-top">
      <span class="drw-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        장바구니 <span id="cartItemCount" class="drw-count-badge"></span>
      </span>
      <div class="drw-hdr-btns">
        <button class="drw-close" id="cartClose">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div class="drw-body" id="cartBody"></div>
  <div class="drw-ftr">
    <div class="drw-total-row">
      <span class="drw-total-lbl">총 합계 <span style="font-size:10px;color:var(--tx3)">(VAT 별도)</span></span>
      <span class="drw-total-val" id="cartTotalDisp">&#8361;0</span>
    </div>
    <div class="drw-ftr-btns">
      <button class="drw-clear-btn" id="trashBtn2">전체 삭제</button>
      <button class="quote-btn" id="quoteBtn" disabled onclick="copyQuote()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        견적 복사하기
      </button>
    </div>
  </div>
</div>

<div id="copy-modal-wrap">
  <div class="copy-modal">
    <div class="cm-hdr">
      <span class="cm-title">&#x1F4CB; 견적서 복사</span>
      <button class="cm-close" id="cmClose">&#x2715;</button>
    </div>
    <div class="cm-body">
      <div class="cm-guide">아래 <strong>복사하기 버튼</strong>을 누르거나 텍스트를 직접 선택 후 복사해서<br>카카오톡, 문자에 붙여넣기 하세요.</div>
      <textarea class="cm-textarea" id="cmTextarea" readonly></textarea>
    </div>
    <div class="cm-ftr">
      <button class="cm-copy-btn" id="cmCopyBtn">복사하기</button>
    </div>
  </div>
</div>

<div id="modal-wrap">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title">&#x1F4CB; 견적 요청</span>
      <button class="modal-close" id="modalClose">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="fld"><label>고객 성함 *</label><input id="custName" type="text" placeholder="홍길동" maxlength="20"></div>
      <div class="fld"><label>연락처 *</label><input id="custPhone" type="tel" placeholder="010-1234-5678" maxlength="13"></div>
      <div class="fld"><label>메모 (선택)</label><textarea id="custMemo" placeholder="납품 일자, 현장 주소, 기타 요청사항"></textarea></div>
      <div class="sec-lbl">선택 품목</div>
      <div class="m-items" id="modalItems"></div>
      <div class="m-total"><span class="m-total-lbl">예상 합계</span><span class="m-total-val" id="modalTotal">&#8361;0</span></div>
      <button class="kakao-btn" id="submitBtn" onclick="sendToKakao()"><span id="submitBtnTxt">견적 복사 후 카카오 채팅 열기</span></button>
      <p class="modal-notice">버튼을 누르면 견적 내용이 <strong>클립보드에 복사</strong>되고 카카오 채널 채팅창이 열립니다.<br>채팅창에서 <strong>붙여넣기 후 전송</strong>해주세요!</p>
    </div>
  </div>
</div>

<div id="cart-popup">
  <div class="cp-inner">
    <div class="cp-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>

let CATALOG     = [];   // 구글 시트에서 로드
let currentCat  = '전체';
let openIdx     = -1;
let searchQ     = '';
let cart        = [];

// ══════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════
function applyData(products) {
  CATALOG = products;
  var catSet = [];
  CATALOG.forEach(function(p){ if(catSet.indexOf(p.cat)===-1) catSet.push(p.cat); });
  CATS.length = 1;
  catSet.forEach(function(c){ CATS.push(c); });
  buildNav();
  renderList();
}

async function loadProducts() {
  showLoading();
  try {
    // 1순위: products.json 로드 (GitHub Pages 환경)
    var res = await fetch('./products.json?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var json = await res.json();
    applyData(json.products || []);
  } catch(err) {
    // 2순위: HTML 내장 데이터 사용 (로컬 파일 환경)

function addCart(gi, oi) {
  const p = CATALOG[gi]; const o = p.opts[oi];
  const qty = parseInt(document.getElementById(`q-${gi}-${oi}`)?.value||0);
  if (qty <= 0) { toast('수량을 입력해주세요'); return; }
  const key = `${gi}-${oi}`;
  const ex = cart.find(c=>c.key===key);
  if (ex) ex.qty += qty; else cart.push({key,groupName:p.name,optName:o.n,price:o.p,qty});
  updateBadge();
  toast(`장바구니에 담겼습니다 🛒`);
}

function rmCartItem(key) {
  cart = cart.filter(c=>c.key!==key);
  updateBadge();
  renderCart();
}

function chgCartQty(key, d) {
  const item = cart.find(c=>c.key===key);
  if (!item) return;
  item.qty = Math.max(1, item.qty + d);
  renderCart();
}

function updateBadge() {
  const total = cart.reduce((s,c)=>s+c.qty,0);
  const badge = document.getElementById('cartBadge');
  badge.textContent = total;
  badge.classList.toggle('show', total > 0);
  document.getElementById('quoteBtn').disabled = cart.length === 0;
}

//  6. 카카오 채널로 견적 전송
// ══════════════════════════════════════════════════════════════
async function sendToKakao() {
  const name  = document.getElementById('custName').value.trim();
  const phone = document.getElementById('custPhone').value.trim();
  const memo  = document.getElementById('custMemo').value.trim();

  if (!name)  { toast('성함을 입력해주세요'); document.getElementById('custName').focus(); return; }
  if (!phone || phone.replace(/\D/g,'').length < 10) {
    toast('연락처를 올바르게 입력해주세요');
    document.getElementById('custPhone').focus(); return;
  }

  // ── 카카오 채팅창에 자동 입력될 메시지 조합 ──
  const total    = cart.reduce((s,c)=>s+(c.price||0)*c.qty,0);
  const hasInq   = cart.some(c=>!c.price);
  const itemText = cart.map(c =>
    `• ${c.groupName} / ${c.optName} × ${c.qty}${c.price ? ' (₩'+( c.price*c.qty).toLocaleString()+')' : ' (가격문의)'}`
  ).join('\n');

  const msg =
    `[(주)온보드 견적 요청]\n` +
    `───────────────\n` +
    `성함: ${name}\n` +
    `연락처: ${phone}\n` +
    `───────────────\n` +
    itemText + '\n' +
    `───────────────\n` +
    `합계: ₩${total.toLocaleString()}${hasInq?' +가격문의 포함':''}\n` +
    (memo ? `메모: ${memo}` : '');

  // ── 구글 시트에도 저장 (API URL이 설정된 경우) ──
  if (SHEET_API_URL && SHEET_API_URL !== 'YOUR_APPS_SCRIPT_WEB_APP_URL') {
    fetch(SHEET_API_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        action: 'order',
        customerName: name,
        customerPhone: phone.replace(/-/g,''),
        items: cart.map(c=>({groupName:c.groupName,optName:c.optName,qty:c.qty,price:c.price})),
        memo,
      }),
    }).catch(()=>{}); // 저장 실패해도 카카오 전송은 진행
  }

  // ── 카카오 채널 채팅창 열기 (메시지 자동 입력) ──
  // kakaoplus 앱 스킴: 앱이 설치된 경우 앱으로, 아니면 웹으로
  const encoded = encodeURIComponent(msg);

  // 모바일: 카카오톡 앱 채팅 딥링크
  const appScheme = `kakaotalk://plusfriend/chat/_MuvvG?message=${encoded}`;
  // 웹 폴백: 카카오 채널 채팅 웹
  const webUrl    = `${KAKAO_CHANNEL_URL}/chat?message=${encoded}`;

  // 클립보드에 메시지 복사 (앱 스킴이 안 될 경우 대비)
  try { navigator.clipboard.writeText(msg); } catch(e) {}

  // 모바일 감지 후 앱 스킴 시도, 실패 시 웹으로
  // 모바일/PC 모두 현재 탭에서 이동 (팝업 차단 방지)
  const isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);
  if (isMobile) {
    // 모바일: 카카오톡 앱으로 이동, 실패 시 웹으로
    window.location.href = appScheme;
    setTimeout(() => { window.location.href = webUrl; }, 500);
  } else {
    // PC: 현재 탭에서 카카오 채널 웹으로 이동
    window.location.href = webUrl;
  }

  // 장바구니 비우기 + 모달 닫기
  cart = [];
  updateBadge();
  closeModal();
  toast(copied ? '✅ 견적 복사 완료! 채팅창에 붙여넣기 후 전송하세요' : '채팅창이 열렸습니다. 내용을 직접 입력해주세요');
}

  barFill.style.transition = 'none';
  barFill.style.width = '100%';
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      barFill.style.transition = 'width '+CP_DURATION+'ms linear';
      barFill.style.width = '0%';
    });
  });
  cpTimer = setTimeout(function() { hideCartPopup(); }, CP_DURATION);
}
function hideCartPopup() {
  var p = document.getElementById('cart-popup');
  if(p) p.classList.remove('show');
}

// ── addCart 재정의 (팝업 포함) ──
function addCart(gi, oi) {
  var p = CATALOG[gi]; var o = p.opts[oi];
  var inp = document.getElementById('q-'+gi+'-'+oi);
  var qty = parseInt((inp && inp.value) || 0);
  if (qty <= 0) { toast('수량을 입력해주세요'); return; }
  var key = gi+'-'+oi;
  var ex = cart.find(function(c){ return c.key===key; });
  if (ex) ex.qty += qty; else cart.push({key:key,groupName:p.name,optName:o.n,price:o.p,qty:qty});
  // 담기 후 수량 0으로 초기화
  if (inp) inp.value = '0';
  updateBadge();
  showCartPopup(key, p.name, o.n);
}

// ── 일괄 담기 ──
function addAllCart(gi) {
  var p = CATALOG[gi];
  var added = 0;
  p.opts.forEach(function(o, oi) {
    var inp = document.getElementById('q-'+gi+'-'+oi);
    var qty = parseInt((inp && inp.value) || 0);
    if (qty <= 0) return;
    var key = gi+'-'+oi;
    var ex = cart.find(function(c){ return c.key===key; });
    if (ex) ex.qty += qty; else cart.push({key:key,groupName:p.name,optName:o.n,price:o.p,qty:qty});
    if (inp) inp.value = '0';
    added++;
  });
  if (added === 0) { toast('수량을 입력해주세요'); return; }
  updateBadge();
  toast(added+'개 품목이 장바구니에 담겼습니다');
}

// ── 일괄 담기 + 장바구니 바로 이동 ──
function addAllAndQuote(gi) {
  var p = CATALOG[gi];
  var added = 0;
  p.opts.forEach(function(o, oi) {
    var inp = document.getElementById('q-'+gi+'-'+oi);
    var qty = parseInt((inp && inp.value) || 0);
    if (qty <= 0) return;
    var key = gi+'-'+oi;
    var ex = cart.find(function(c){ return c.key===key; });
    if (ex) ex.qty += qty; else cart.push({key:key,groupName:p.name,optName:o.n,price:o.p,qty:qty});
    if (inp) inp.value = '0';
    added++;
  });
  if (added === 0) { toast('수량을 입력해주세요'); return; }
  updateBadge();
  openCart();
}

// ── 견적 복사 ──
function copyQuote() {
  if (!cart.length) return;
  var total = cart.reduce(function(s,c){ return s+(c.price||0)*c.qty; }, 0);
  var hasInq = cart.some(function(c){ return !c.price; });
  var now = new Date();
  var d = now.getFullYear()+'.'+String(now.getMonth()+1).padStart(2,'0')+'.'+String(now.getDate()).padStart(2,'0');
  var lines = [];
  cart.forEach(function(c,i) {
    var p = c.price ? ' = \u20a9'+(c.price*c.qty).toLocaleString()+'\uc6d0' : ' (\uac00\uaca9\ubb38\uc758)';
    lines.push((i+1)+'. '+c.groupName);
    lines.push('   \u2514 '+c.optName+' x '+c.qty+'\uac1c'+p);
  });
  var sep = '------------------';
  var tot = '\u20a9'+total.toLocaleString()+'\uc6d0'+(hasInq?' +\uac00\uaca9\ubb38\uc758 \ud56d\ubaa9':'');
  var msg = ['\uD83D\uDCCB \uacac\uc801\uc11c ('+d+')', sep]
    .concat(lines)
    .concat([sep, '\ud569\uacc4: '+tot, '(VAT \ubcc4\ub3c4)', '', '[\ubb38\uc758] (\uc8fc)\uc628\ubcf4\ub4dc'])
    .join('\n');
  var ta = document.getElementById('cmTextarea');
  ta.value = msg;
  document.getElementById('copy-modal-wrap').classList.add('open');
  closeCart();
  setTimeout(function(){ ta.focus(); ta.select(); }, 350);
}

// ── 복사 모달 이벤트 ──
var cmCloseEl = document.getElementById('cmClose'); if(cmCloseEl) cmCloseEl.addEventListener('click', function(){ document.getElementById('copy-modal-wrap').classList.remove('open'); });
document.getElementById('copy-modal-wrap').addEventListener('click', function(e){ if(e.target===this) this.classList.remove('open'); });
document.getElementById('cmCopyBtn').addEventListener('click', function(){
  var ta = document.getElementById('cmTextarea');
  ta.select();
  var btn = this;
  function onSuccess() {
    btn.textContent = '\u2705 \ubcf5\uc0ac \uc644\ub8cc!';
    setTimeout(function(){ btn.textContent = '\ubcf5\uc0ac\ud558\uae30'; }, 2500);
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(ta.value).then(onSuccess).catch(function(){
      try { document.execCommand('copy'); onSuccess(); } catch(e2) { toast('\ud14d\uc2a4\ud2b8\ub97c \uc9c1\uc811 \uc120\ud0dd \ud6c4 \ubcf5\uc0ac\ud574\uc8fc\uc138\uc694'); }
    });
  } else {
    try { document.execCommand('copy'); onSuccess(); } catch(e) { toast('\ud14d\uc2a4\ud2b8\ub97c \uc9c1\uc811 \uc120\ud0dd \ud6c4 \ubcf5\uc0ac\ud574\uc8fc\uc138\uc694'); }
  }
});

// ── 전체 삭제 ──
document.getElementById('trashBtn2').addEventListener('click', function(){
  if(cart.length && confirm('\uc7a5\ubc14\uad6c\ub2c8\ub97c \uc804\uccb4 \ube44\uc6b0\uc2dc\uaca0\uc2b5\ub2c8\uae4c?')){
    cart=[]; updateBadge(); renderCart(); toast('\uc7a5\ubc14\uad6c\ub2c8\uac00 \ube44\uc6cc\uc84c\uc2b5\ub2c8\ub2e4');
  }
});

// ── 기타 이벤트 (null 안전 처리) ──
function bindId(id, event, fn) {
  var el = document.getElementById(id);
  if(el) el.addEventListener(event, fn);
}
bindId('cartBtn',   'click', openCart);
bindId('cartClose', 'click', closeCart);
bindId('cart-ov',   'click', closeCart);
bindId('quoteBtn',  'click', copyQuote);
bindId('modalClose','click', closeModal);
bindId('submitBtn', 'click', sendToKakao);
var mw = document.getElementById('modal-wrap');
if(mw) mw.addEventListener('click', function(e){ if(e.target===this) closeModal(); });
document.addEventListener('keydown', function(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){ e.preventDefault(); toggleSearch(); }
  if(e.key==='Escape') closeModal();
});

loadProducts();

</script>
